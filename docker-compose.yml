version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: tasks
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"

  app:
    build: ./app
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      DB_HOST: db