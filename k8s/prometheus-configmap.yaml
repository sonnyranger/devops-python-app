apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
data:
  prometheus.yml: |
    global:
      scrape_interval: 5s

    scrape_configs:
      - job_name: 'fastapi'
        static_configs:
          - targets: ['task-service:80']

      - job_name: 'node-exporter'
        static_configs:
          - targets: ['node-exporter:9100']
